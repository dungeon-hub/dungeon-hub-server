version: "3"
services:
  dungeon-hub-dev:
    image: 'mariadb:latest'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dungeon-hub
    ports:
      - '3306:3306'
  dungeon-hub-test-postgres:
    image: 'postgres:latest'
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: dungeon-hub
    ports:
      - '5432:5432'