spring.flyway.enabled=false
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=true
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
springdoc.api-docs.path=/api-src
spring.mvc.converters.preferred-json-mapper=gson

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://auth.dungeon-hub.net/realms/dungeon-hub-test
spring.security.oauth2.resourceserver.jwt.public-key-location=https://auth.dungeon-hub.net/realms/dungeon-hub-test
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://auth.dungeon-hub.net/realms/dungeon-hub-test/protocol/openid-connect/certs